services:
  postgres:
    image: postgres:17
    container_name: postgres-db
    environment:
      POSTGRES_DB: desafio-nubank-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: moeda1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    image: desafio-nubank-api
    container_name: api-nubank
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
